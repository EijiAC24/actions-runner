name: News Podcasts (Matrix)

# Unified workflow for AI/Crypto/English news podcasts.
# Starts out dispatch-only; enable the schedule block below and disable
# the three legacy workflows (ainewstoday.yml / cryptonews.yml /
# englishnews.yml) once this has been validated on a few real runs.

on:
  # schedule:
  #   - cron: '30 19 * * *'  # 19:30 UTC = 04:30 JST
  workflow_dispatch:
    inputs:
      podcast_id:
        description: 'Which podcast to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ainewstoday
          - cryptonews
          - englishnews
      skip_upload:
        description: 'Skip uploading to hosting'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  TZ: Asia/Tokyo

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        podcast:
          - id: ainewstoday
            display_name: AIニュースTODAY
            rss_path: 'public/ainewstoday/podcast.xml'
          - id: cryptonews
            display_name: クリプトトゥデイ
            rss_path: 'public/cryptonews/podcast.xml'
          - id: englishnews
            display_name: 英語ニュース聞き流し
            rss_path: 'public/englishnews/podcast.xml'
    # On manual dispatch, honour the podcast_id filter.
    # On schedule, always run every podcast.
    if: github.event_name == 'schedule' || inputs.podcast_id == 'all' || inputs.podcast_id == matrix.podcast.id

    steps:
      - name: Checkout main project
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/AInewsToday
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: 'main'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: main/package-lock.json

      - name: Install dependencies
        run: cd main && npm ci

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build TypeScript
        run: cd main && npm run build

      - name: Run podcast automation
        working-directory: main
        env:
          PODCAST_ID: ${{ matrix.podcast.id }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID_DAILYBLEND }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          GITHUB_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          GITHUB_REPO: EijiAC24/podcast-network-rss
          GITHUB_RSS_PATH: ${{ matrix.podcast.rss_path }}
          SKIP_UPLOAD: ${{ inputs.skip_upload }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          # Per-podcast refresh token, selected at expansion time
          YOUTUBE_REFRESH_TOKEN: ${{
            matrix.podcast.id == 'ainewstoday' && secrets.YOUTUBE_REFRESH_TOKEN_AINEWSTODAY
            || matrix.podcast.id == 'cryptonews' && secrets.YOUTUBE_REFRESH_TOKEN_CRYPTONEWS
            || secrets.YOUTUBE_REFRESH_TOKEN_ENGLISHNEWS }}
        run: npm start

      - name: Commit RSS changes
        if: success()
        working-directory: main
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          cp output/rss/podcast.xml "${RUNNER_TEMP}/podcast.xml"
          git fetch origin main
          git reset --hard origin/main
          mkdir -p output/rss
          cp "${RUNNER_TEMP}/podcast.xml" output/rss/podcast.xml
          git add output/rss/podcast.xml
          git diff --staged --quiet || git commit -m "Update ${{ matrix.podcast.display_name }} RSS - $(date +%Y-%m-%d)"
          git push || true

  cleanup:
    runs-on: ubuntu-latest
    needs: generate
    if: always()
    steps:
      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          gh run list --repo ${{ github.repository }} --workflow "News Podcasts (Matrix)" --json databaseId --jq '.[].databaseId' | while read id; do
            if [ "$id" != "${{ github.run_id }}" ]; then
              gh run delete "$id" --repo ${{ github.repository }} || true
            fi
          done
